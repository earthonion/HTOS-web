{% extends "base.html" %}
{% block title %}Convert{% endblock %}
{% block content %}
<h1>Convert Saves</h1>
<p>Convert decrypted save files between platforms. No PS4 connection required.</p>

<form method="POST" enctype="multipart/form-data" class="operation-form">
    <label>Game
        <select name="game" required>
            <option value="">-- Select Game --</option>
            {% for g in games %}
            <option value="{{ g }}">{{ g }}</option>
            {% endfor %}
        </select>
    </label>

    <label>Platform Direction (for BL3/TTWL when auto-detect fails)
        <select name="platform">
            <option value="ps4">PS4 &rarr; PC</option>
            <option value="pc">PC &rarr; PS4</option>
        </select>
    </label>

    <div class="file-drop">
        <input type="file" name="files" multiple required>
        <svg class="file-drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div class="file-drop-text">Drop save files here or <strong>browse</strong></div>
        <div class="file-drop-hint">Decrypted save files</div>
        <div class="file-drop-selected"></div>
    </div>

    <button type="submit">Start Conversion</button>
</form>
{% endblock %}
