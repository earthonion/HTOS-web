<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification Required</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0f12;
            color: #c8ccd4;
            font-family: 'Fira Code', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            max-width: 480px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #e2e5eb;
            margin-bottom: 0.5rem;
        }
        .header p {
            font-size: 0.78rem;
            color: #6b7280;
            line-height: 1.5;
        }
        .panel {
            background: #161a21;
            border: 1px solid #2a2f3a;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .panel h2 {
            font-size: 0.82rem;
            font-weight: 600;
            color: #e2e5eb;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .step-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-weight: 700;
        }
        .progress-bar {
            background: #1e232d;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        .progress-fill {
            background: linear-gradient(90deg, #6366f1, #06b6d4);
            height: 100%;
            border-radius: 4px;
            transition: width 1.5s ease;
        }
        /* Captcha */
        .captcha-img {
            background: #1e232d;
            border: 1px solid #2a2f3a;
            border-radius: 4px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            position: relative;
            overflow: hidden;
            user-select: none;
        }
        .captcha-text {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.25rem;
            position: relative;
            z-index: 1;
        }
        .captcha-noise {
            position: absolute;
            inset: 0;
            opacity: 0.3;
        }
        .captcha-input {
            width: 100%;
            background: #1e232d;
            border: 1px solid #2a2f3a;
            border-radius: 4px;
            padding: 0.5rem 0.75rem;
            color: #c8ccd4;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            outline: none;
            margin-bottom: 0.75rem;
        }
        .captcha-input:focus { border-color: #6366f1; }
        /* Maze */
        #maze-canvas {
            display: block;
            margin: 0 auto 0.75rem;
            border: 1px solid #2a2f3a;
            border-radius: 4px;
            cursor: crosshair;
            touch-action: none;
        }
        .maze-hint {
            text-align: center;
            font-size: 0.7rem;
            color: #6b7280;
            margin-bottom: 0.75rem;
        }
        /* Math */
        .math-problem {
            font-size: 1.3rem;
            text-align: center;
            color: #e2e5eb;
            padding: 1rem;
            background: #1e232d;
            border-radius: 4px;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        /* Buttons */
        .btn {
            width: 100%;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.6rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #4f46e5; }
        .btn:disabled { opacity: 0.5; cursor: default; }
        .msg {
            text-align: center;
            font-size: 0.75rem;
            padding: 0.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }
        .msg.error { background: rgba(239,68,68,0.1); color: #f87171; display: block; }
        .msg.success { background: rgba(34,197,94,0.1); color: #4ade80; display: block; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.3rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        /* Slider captcha */
        .slider-track {
            background: #1e232d;
            border: 1px solid #2a2f3a;
            border-radius: 4px;
            height: 40px;
            position: relative;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .slider-target {
            position: absolute;
            top: 4px;
            width: 32px;
            height: 32px;
            background: rgba(6, 182, 212, 0.2);
            border: 2px dashed #06b6d4;
            border-radius: 4px;
        }
        .slider-thumb {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 32px;
            height: 32px;
            background: #6366f1;
            border-radius: 4px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            user-select: none;
            transition: background 0.15s;
            z-index: 2;
        }
        .slider-thumb:active { cursor: grabbing; background: #4f46e5; }
        .slider-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.7rem;
            color: #4b5563;
            pointer-events: none;
        }
        /* Typing challenge */
        .typing-target {
            background: #1e232d;
            border: 1px solid #2a2f3a;
            border-radius: 4px;
            padding: 0.75rem;
            font-size: 0.82rem;
            color: #e2e5eb;
            margin-bottom: 0.75rem;
            line-height: 1.6;
            text-align: center;
            user-select: none;
        }
        textarea.captcha-input {
            resize: none;
            height: 60px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Account Verification Required</h1>
        <p>We've detected unusual activity on your account. Please complete the verification steps below to regain access.</p>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
    </div>

    <div id="msg" class="msg"></div>

    <div class="panel" id="challenge-panel">
        <h2><span class="step-badge" id="step-label">STEP 1 OF 5</span> <span id="challenge-title">Loading...</span></h2>
        <div id="challenge-body"></div>
        <button class="btn" id="submit-btn" onclick="submitChallenge()">Verify</button>
    </div>

    <p style="text-align:center; font-size:0.65rem; color:#4b5563; margin-top:1rem;">
        This is a mandatory security check. All steps must be completed.
    </p>
</div>

<script>
(function() {
    var step = 0;
    var totalSteps = 5;
    var captchaAnswer = '';
    var mathAnswer = 0;
    var mazeComplete = false;
    var sliderDone = false;
    var typingTarget = '';
    var challengeType = '';

    var challengeTypes = ['captcha', 'maze', 'math', 'slider', 'typing'];

    function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
        }
        return arr;
    }

    function randomChars(n) {
        var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        var s = '';
        for (var i = 0; i < n; i++) s += c[Math.floor(Math.random() * c.length)];
        return s;
    }

    function showMsg(text, type) {
        var el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
        setTimeout(function() { el.className = 'msg'; }, 3000);
    }

    function updateProgress() {
        // Progress never actually reaches 100% - it asymptotically approaches it
        var pct = Math.min(95, (step / (step + 3)) * 100);
        document.getElementById('progress').style.width = pct + '%';
        // The step counter always says there are more steps
        var displayStep = step + 1;
        var displayTotal = displayStep + Math.floor(Math.random() * 3) + 2;
        document.getElementById('step-label').textContent = 'STEP ' + displayStep + ' OF ' + displayTotal;
    }

    // ── CAPTCHA ──
    function generateCaptcha() {
        challengeType = 'captcha';
        captchaAnswer = randomChars(16);
        document.getElementById('challenge-title').textContent = 'Text Verification';
        var colors = ['#f87171', '#fb923c', '#a78bfa', '#34d399', '#60a5fa', '#fbbf24'];
        var html = '<div class="captcha-img"><svg class="captcha-noise" viewBox="0 0 200 70">';
        // noise lines
        for (var i = 0; i < 8; i++) {
            var c = colors[Math.floor(Math.random() * colors.length)];
            html += '<line x1="' + Math.random()*200 + '" y1="' + Math.random()*70 + '" x2="' + Math.random()*200 + '" y2="' + Math.random()*70 + '" stroke="' + c + '" stroke-width="1" opacity="0.4"/>';
        }
        // dots
        for (var i = 0; i < 30; i++) {
            html += '<circle cx="' + Math.random()*200 + '" cy="' + Math.random()*70 + '" r="' + (Math.random()*2+1) + '" fill="' + colors[Math.floor(Math.random()*colors.length)] + '" opacity="0.3"/>';
        }
        html += '</svg><span class="captcha-text" style="color:' + colors[Math.floor(Math.random()*colors.length)] + '; transform: rotate(' + (Math.random()*8-4) + 'deg) skewX(' + (Math.random()*10-5) + 'deg);">' + captchaAnswer + '</span></div>';
        html += '<input type="text" class="captcha-input" id="captcha-input" placeholder="Enter the text above" autocomplete="off" maxlength="16">';
        document.getElementById('challenge-body').innerHTML = html;
        document.getElementById('captcha-input').focus();
    }

    // ── MAZE ──
    function generateMaze() {
        challengeType = 'maze';
        mazeComplete = false;
        document.getElementById('challenge-title').textContent = 'Navigate to Exit';
        var html = '<canvas id="maze-canvas" width="280" height="280"></canvas>';
        html += '<div class="maze-hint">Click/tap to move. Reach the green square.</div>';
        document.getElementById('challenge-body').innerHTML = html;
        buildMaze();
    }

    function buildMaze() {
        var cols = 14, rows = 14, size = 20;
        var canvas = document.getElementById('maze-canvas');
        var ctx = canvas.getContext('2d');
        // DFS maze gen
        var grid = [];
        for (var r = 0; r < rows; r++) {
            grid[r] = [];
            for (var c = 0; c < cols; c++) {
                grid[r][c] = { top:true, right:true, bottom:true, left:true, visited:false };
            }
        }
        var stack = [{r:0, c:0}];
        grid[0][0].visited = true;
        while (stack.length) {
            var cur = stack[stack.length-1];
            var neighbors = [];
            if (cur.r > 0 && !grid[cur.r-1][cur.c].visited) neighbors.push({r:cur.r-1, c:cur.c, d:'top'});
            if (cur.r < rows-1 && !grid[cur.r+1][cur.c].visited) neighbors.push({r:cur.r+1, c:cur.c, d:'bottom'});
            if (cur.c > 0 && !grid[cur.r][cur.c-1].visited) neighbors.push({r:cur.r, c:cur.c-1, d:'left'});
            if (cur.c < cols-1 && !grid[cur.r][cur.c+1].visited) neighbors.push({r:cur.r, c:cur.c+1, d:'right'});
            if (neighbors.length === 0) { stack.pop(); continue; }
            var next = neighbors[Math.floor(Math.random()*neighbors.length)];
            if (next.d === 'top') { grid[cur.r][cur.c].top = false; grid[next.r][next.c].bottom = false; }
            if (next.d === 'bottom') { grid[cur.r][cur.c].bottom = false; grid[next.r][next.c].top = false; }
            if (next.d === 'left') { grid[cur.r][cur.c].left = false; grid[next.r][next.c].right = false; }
            if (next.d === 'right') { grid[cur.r][cur.c].right = false; grid[next.r][next.c].left = false; }
            grid[next.r][next.c].visited = true;
            stack.push(next);
        }
        // Player
        var pr = 0, pc = 0;
        var endR = rows-1, endC = cols-1;

        function draw() {
            ctx.fillStyle = '#1e232d';
            ctx.fillRect(0, 0, 280, 280);
            for (var r = 0; r < rows; r++) {
                for (var c = 0; c < cols; c++) {
                    var x = c * size, y = r * size;
                    ctx.strokeStyle = '#3a4050';
                    ctx.lineWidth = 2;
                    if (grid[r][c].top) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+size,y); ctx.stroke(); }
                    if (grid[r][c].right) { ctx.beginPath(); ctx.moveTo(x+size,y); ctx.lineTo(x+size,y+size); ctx.stroke(); }
                    if (grid[r][c].bottom) { ctx.beginPath(); ctx.moveTo(x,y+size); ctx.lineTo(x+size,y+size); ctx.stroke(); }
                    if (grid[r][c].left) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+size); ctx.stroke(); }
                }
            }
            // End
            ctx.fillStyle = 'rgba(34, 197, 94, 0.3)';
            ctx.fillRect(endC*size+2, endR*size+2, size-4, size-4);
            // Player
            ctx.fillStyle = '#6366f1';
            ctx.beginPath();
            ctx.arc(pc*size+size/2, pr*size+size/2, size/3, 0, Math.PI*2);
            ctx.fill();
        }
        draw();

        function tryMove(dr, dc) {
            var nr = pr+dr, nc = pc+dc;
            if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) return;
            if (dr === -1 && grid[pr][pc].top) return;
            if (dr === 1 && grid[pr][pc].bottom) return;
            if (dc === -1 && grid[pr][pc].left) return;
            if (dc === 1 && grid[pr][pc].right) return;
            pr = nr; pc = nc;
            draw();
            if (pr === endR && pc === endC) {
                mazeComplete = true;
                ctx.fillStyle = 'rgba(34, 197, 94, 0.5)';
                ctx.fillRect(0, 0, 280, 280);
                ctx.fillStyle = '#fff';
                ctx.font = '600 16px "Fira Code"';
                ctx.textAlign = 'center';
                ctx.fillText('Maze Complete!', 140, 145);
            }
        }

        canvas.addEventListener('click', function(e) {
            if (mazeComplete) return;
            var rect = canvas.getBoundingClientRect();
            var mx = e.clientX - rect.left, my = e.clientY - rect.top;
            var tc = Math.floor(mx / size), tr = Math.floor(my / size);
            var dr = tr - pr, dc = tc - pc;
            // Move one step toward click
            if (Math.abs(dr) >= Math.abs(dc)) {
                tryMove(dr > 0 ? 1 : -1, 0);
            } else {
                tryMove(0, dc > 0 ? 1 : -1);
            }
        });

        document.addEventListener('keydown', function handler(e) {
            if (challengeType !== 'maze' || mazeComplete) {
                document.removeEventListener('keydown', handler);
                return;
            }
            if (e.key === 'ArrowUp' || e.key === 'w') tryMove(-1, 0);
            if (e.key === 'ArrowDown' || e.key === 's') tryMove(1, 0);
            if (e.key === 'ArrowLeft' || e.key === 'a') tryMove(0, -1);
            if (e.key === 'ArrowRight' || e.key === 'd') tryMove(0, 1);
        });
    }

    // ── MATH ──
    function generateMath() {
        challengeType = 'math';
        document.getElementById('challenge-title').textContent = 'Solve the Equation';
        var ops = [
            function() { var a=Math.floor(Math.random()*50+10), b=Math.floor(Math.random()*50+10); mathAnswer=a+b; return a + ' + ' + b + ' = ?'; },
            function() { var a=Math.floor(Math.random()*30+20), b=Math.floor(Math.random()*20+1); mathAnswer=a-b; return a + ' - ' + b + ' = ?'; },
            function() { var a=Math.floor(Math.random()*12+2), b=Math.floor(Math.random()*12+2); mathAnswer=a*b; return a + ' x ' + b + ' = ?'; },
            function() {
                var b=Math.floor(Math.random()*9+2), a=b*Math.floor(Math.random()*12+2);
                mathAnswer=a/b; return a + ' / ' + b + ' = ?';
            },
            function() {
                var a=Math.floor(Math.random()*15+5), b=Math.floor(Math.random()*15+5), c=Math.floor(Math.random()*10+1);
                mathAnswer=a+b-c; return a + ' + ' + b + ' - ' + c + ' = ?';
            },
        ];
        var prob = ops[Math.floor(Math.random()*ops.length)]();
        var html = '<div class="math-problem">' + prob + '</div>';
        html += '<input type="number" class="captcha-input" id="math-input" placeholder="Your answer" autocomplete="off">';
        document.getElementById('challenge-body').innerHTML = html;
        document.getElementById('math-input').focus();
    }

    // ── SLIDER ──
    function generateSlider() {
        challengeType = 'slider';
        sliderDone = false;
        document.getElementById('challenge-title').textContent = 'Slide to Verify';
        var targetPos = Math.floor(Math.random() * 180) + 60;
        var html = '<div class="slider-track" id="slider-track">';
        html += '<div class="slider-label">Slide the block to the target</div>';
        html += '<div class="slider-target" id="slider-target" style="left:' + targetPos + 'px;"></div>';
        html += '<div class="slider-thumb" id="slider-thumb">&rarr;</div>';
        html += '</div>';
        document.getElementById('challenge-body').innerHTML = html;

        var thumb = document.getElementById('slider-thumb');
        var track = document.getElementById('slider-track');
        var dragging = false, startX = 0, thumbLeft = 4;

        function setPos(x) {
            thumbLeft = Math.max(4, Math.min(track.offsetWidth - 36, x));
            thumb.style.left = thumbLeft + 'px';
            // Check if close to target
            if (Math.abs(thumbLeft - targetPos) < 6) {
                thumb.style.background = '#22c55e';
                sliderDone = true;
            } else {
                thumb.style.background = '#6366f1';
                sliderDone = false;
            }
        }

        thumb.addEventListener('mousedown', function(e) { dragging = true; startX = e.clientX - thumbLeft; e.preventDefault(); });
        document.addEventListener('mousemove', function(e) { if (dragging) setPos(e.clientX - startX); });
        document.addEventListener('mouseup', function() { dragging = false; });
        thumb.addEventListener('touchstart', function(e) { dragging = true; startX = e.touches[0].clientX - thumbLeft; e.preventDefault(); });
        document.addEventListener('touchmove', function(e) { if (dragging) setPos(e.touches[0].clientX - startX); });
        document.addEventListener('touchend', function() { dragging = false; });
    }

    // ── TYPING ──
    function generateTyping() {
        challengeType = 'typing';
        document.getElementById('challenge-title').textContent = 'Type the Following Text';
        var phrases = [
            'I am not a robot and I verify my identity',
            'Security verification is important for all users',
            'Please type this sentence to confirm your account',
            'This verification protects your account from threats',
            'Human verification ensures platform integrity',
            'Type each character exactly as shown above',
            'Account safety requires periodic verification steps',
        ];
        typingTarget = phrases[Math.floor(Math.random() * phrases.length)];
        var html = '<div class="typing-target">' + typingTarget + '</div>';
        html += '<textarea class="captcha-input" id="typing-input" placeholder="Type the text above exactly..."></textarea>';
        document.getElementById('challenge-body').innerHTML = html;
        document.getElementById('typing-input').focus();
    }

    // ── CHALLENGE FLOW ──
    function nextChallenge() {
        if (step % challengeTypes.length === 0) shuffle(challengeTypes);
        var type = challengeTypes[step % challengeTypes.length];
        updateProgress();

        switch(type) {
            case 'captcha': generateCaptcha(); break;
            case 'maze': generateMaze(); break;
            case 'math': generateMath(); break;
            case 'slider': generateSlider(); break;
            case 'typing': generateTyping(); break;
        }
    }

    window.submitChallenge = function() {
        var valid = false;
        var btn = document.getElementById('submit-btn');

        switch(challengeType) {
            case 'captcha':
                var input = document.getElementById('captcha-input');
                valid = input && input.value.toUpperCase() === captchaAnswer;
                if (!valid) { showMsg('Incorrect. Please try again with a new code.', 'error'); generateCaptcha(); return; }
                break;
            case 'maze':
                valid = mazeComplete;
                if (!valid) { showMsg('Please complete the maze first.', 'error'); return; }
                break;
            case 'math':
                var input = document.getElementById('math-input');
                valid = input && parseInt(input.value) === mathAnswer;
                if (!valid) { showMsg('Incorrect answer. Try a new problem.', 'error'); generateMath(); return; }
                break;
            case 'slider':
                valid = sliderDone;
                if (!valid) { showMsg('Please slide the block to the target position.', 'error'); return; }
                break;
            case 'typing':
                var input = document.getElementById('typing-input');
                valid = input && input.value.trim() === typingTarget;
                if (!valid) { showMsg('Text does not match. Please type it exactly.', 'error'); return; }
                break;
        }

        // 30% chance of failing even with a correct answer
        if (Math.random() < 0.3) {
            var failMsgs = [
                'Verification failed. Please try again.',
                'Could not verify response. Try once more.',
                'Server could not confirm. Please retry.',
                'Validation error. Please complete a new challenge.',
                'Response timed out. Please try again.',
            ];
            showMsg(failMsgs[Math.floor(Math.random() * failMsgs.length)], 'error');
            nextChallenge();
            return;
        }

        // They got it right! Show fake "verifying..." then give them another one
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Verifying<span class="loading-dots"></span>';
        showMsg('', '');

        // Fake server check that always comes back with "need more verification"
        var delay = Math.floor(Math.random() * 2000) + 1500;
        setTimeout(function() {
            fetch('/verification/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({step: step})
            }).then(function(r) { return r.json(); }).then(function(d) {
                btn.disabled = false;
                btn.textContent = 'Verify';
                if (d.ok) {
                    // This never happens :)
                    window.location.href = '/';
                } else {
                    showMsg(d.message, 'error');
                    step++;
                    nextChallenge();
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = 'Verify';
                showMsg('Connection error. Please try again.', 'error');
                step++;
                nextChallenge();
            });
        }, delay);
    };

    // Enter key submits
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && challengeType !== 'maze') {
            e.preventDefault();
            submitChallenge();
        }
    });

    // Start
    nextChallenge();
})();
