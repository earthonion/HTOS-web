{% extends "base.html" %}
{% block title %}Decrypt{% endblock %}
{% block content %}
<h1>Decrypt Saves</h1>
<p>Upload encrypted save pairs to decrypt them.</p>

<form method="POST" enctype="multipart/form-data" class="operation-form">
    <div class="file-drop">
        <input type="file" name="saves" multiple required>
        <svg class="file-drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div class="file-drop-text">Drop files here, or <strong>browse files</strong></div>
        <div class="file-drop-hint">.bin + matching save file, or a .zip</div>
        <div class="file-drop-selected"></div>
    </div>

    <label class="checkbox-label">
        <input type="checkbox" name="include_sce_sys" checked>
        Include sce_sys folder
    </label>

    <label class="checkbox-label">
        <input type="checkbox" name="ignore_secondlayer">
        Ignore second-layer checks
    </label>

    <button type="submit">Start Decrypt</button>
</form>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form.operation-form');
    if (form) setupChunkedForm(form, { saves: 'upload_ids' });
});
</script>
{% endblock %}
