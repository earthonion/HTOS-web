<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bulb" cx="16" cy="17" r="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="40%" stop-color="#ebe3d6"/>
      <stop offset="100%" stop-color="#cfc2ae"/>
    </radialGradient>
    <radialGradient id="shine" cx="13" cy="14" r="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fffdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ebe3d6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="16" cy="16" r="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ffe680" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeglow" cx="0.4" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ffffee"/>
      <stop offset="40%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="haloglow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Divine golden aura -->
  <circle cx="16" cy="16" r="15" fill="url(#halo)"/>

  <!-- Halo ring -->
  <ellipse cx="16" cy="6" rx="6.5" ry="2" fill="none" stroke="#f0c430" stroke-width="1" opacity="0.7" filter="url(#haloglow)"/>

  <!-- Garlic bulb - round and bulbous -->
  <path d="M16 28 C11 28 7.5 24 7 19 C6.5 14 9 10.5 12 10 C12.5 9.8 13 10 13.2 10.2 C13.5 9 14.5 8 16 8 C17.5 8 18.5 9 18.8 10.2 C19 10 19.5 9.8 20 10 C23 10.5 25.5 14 25 19 C24.5 24 21 28 16 28Z" fill="url(#bulb)" stroke="#b8a890" stroke-width="0.5"/>

  <!-- Clove segment lines -->
  <path d="M12.5 10.5 C13 15 13 21 13.5 27" fill="none" stroke="#c4b49a" stroke-width="0.6" opacity="0.6"/>
  <path d="M19.5 10.5 C19 15 19 21 18.5 27" fill="none" stroke="#c4b49a" stroke-width="0.6" opacity="0.6"/>
  <path d="M16 8.5 C16 13 16 20 16 28" fill="none" stroke="#c4b49a" stroke-width="0.5" opacity="0.4"/>
  <path d="M9.5 13 C10 17 10.5 22 11.5 26.5" fill="none" stroke="#c4b49a" stroke-width="0.4" opacity="0.35"/>
  <path d="M22.5 13 C22 17 21.5 22 20.5 26.5" fill="none" stroke="#c4b49a" stroke-width="0.4" opacity="0.35"/>

  <!-- Papery skin highlight -->
  <path d="M16 28 C11 28 7.5 24 7 19 C6.5 14 9 10.5 12 10 C12.5 9.8 13 10 13.2 10.2 C13.5 9 14.5 8 16 8 C17.5 8 18.5 9 18.8 10.2 C19 10 19.5 9.8 20 10 C23 10.5 25.5 14 25 19 C24.5 24 21 28 16 28Z" fill="url(#shine)"/>

  <!-- Root nub -->
  <ellipse cx="16" cy="28.5" rx="2.5" ry="0.8" fill="#b8a890" opacity="0.5"/>
  <path d="M14.5 28.5 C14.8 30 15 30.5 14.5 31.5" fill="none" stroke="#a09080" stroke-width="0.4" opacity="0.4"/>
  <path d="M16 28.5 C16 30 16 31 16 31.5" fill="none" stroke="#a09080" stroke-width="0.4" opacity="0.4"/>
  <path d="M17.5 28.5 C17.2 30 17 30.5 17.5 31.5" fill="none" stroke="#a09080" stroke-width="0.4" opacity="0.4"/>

  <!-- Long green sprout -->
  <path d="M16 8 C16 6 15.5 4 14.5 2 C14 1 13.5 0.3 13 0" fill="none" stroke="#6a8a4a" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M16 8 C16.5 6 17.2 4 18 2.5 C18.5 1.5 19 0.8 19.5 0.3" fill="none" stroke="#7a9a5a" stroke-width="1" stroke-linecap="round"/>
  <path d="M16 7 C15.8 5.5 15.2 3.5 14.8 2" fill="none" stroke="#8aaa6a" stroke-width="0.6" opacity="0.5" stroke-linecap="round"/>

  <!-- Relaxed glowing golden eyes -->
  <circle cx="13.5" cy="17" r="1.2" fill="url(#eyeglow)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="18.5" cy="17" r="1.2" fill="url(#eyeglow)" filter="url(#glow)" opacity="0.8"/>
  <!-- Half-closed lids -->
  <path d="M12 16.5 C12.8 16 14.2 16 15 16.5" fill="#cfc2ae" stroke="#b8a890" stroke-width="0.3"/>
  <path d="M17 16.5 C17.8 16 19.2 16 20 16.5" fill="#cfc2ae" stroke="#b8a890" stroke-width="0.3"/>

  <!-- Gentle closed smile -->
  <path d="M13.5 21 C14.5 22 17.5 22 18.5 21" fill="none" stroke="#8a7a6a" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Divine rays from sprout -->
  <g stroke="#f0c430" stroke-width="0.5" opacity="0.4" stroke-linecap="round">
    <line x1="13" y1="0" x2="11.5" y2="-0.5"/>
    <line x1="14" y1="1" x2="12" y2="0"/>
    <line x1="19.5" y1="0.3" x2="21" y2="-0.5"/>
    <line x1="18.5" y1="1.5" x2="20.5" y2="0.5"/>
    <line x1="16" y1="1" x2="16" y2="-0.5"/>
  </g>
</svg>
